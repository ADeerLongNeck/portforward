name: Build GUI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-gui:
    name: Build GUI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: PortForward-linux-x64
            ext: AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: PortForward-macos-x64
            ext: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: PortForward-macos-arm64
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: PortForward-windows-x64
            ext: msi

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles appimage

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles msi

      - name: Find artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" -exec mv {} PortForward-linux-x64.AppImage \;

      - name: Find artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" -exec mv {} ${{ matrix.artifact }}.dmg \;

      - name: Find artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          find src-tauri/target/${{ matrix.target }}/release/bundle/msi -name "*.msi" -exec mv {} ${{ matrix.artifact }}.msi \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build-gui
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
